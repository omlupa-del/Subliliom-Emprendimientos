<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club VIP - Experiencia Exclusiva</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --azul-vip: #1a2a6c;
            --rojo-vip: #e74c3c;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f6;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; background-color: var(--gris-fondo); 
            overflow-x: hidden;
        }

        /* --- PANTALLA DE BIENVENIDA (SPLASH) --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--azul-vip) 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; color: var(--blanco); 
            transition: opacity 0.8s ease;
        }

        .contenedor-registro {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            width: 85%; max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .badge-alerta {
            background: var(--rojo-vip); color: white;
            padding: 5px 12px; border-radius: 50px;
            font-size: 10px; font-weight: bold;
            display: inline-block; margin-bottom: 15px;
            letter-spacing: 1px; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 10px; border: none; outline: none;
            font-family: 'Montserrat', sans-serif; box-sizing: border-box;
        }

        .btn-activar {
            background: var(--rojo-vip); color: white;
            border: none; padding: 16px; width: 100%;
            border-radius: 10px; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* --- CONTENIDO PRINCIPAL (OCULTO AL INICIO) --- */
        #main-content { 
            opacity: 0; display: none; padding: 20px; 
            max-width: 500px; margin: auto; transition: 1s ease;
        }

        .tarjeta-vip {
            background: white; border-radius: 30px; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;
        }

        .divider { width: 60px; height: 5px; background: var(--rojo-vip); margin: 15px auto; border-radius: 10px; }

        .btn-accion {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 15px; text-decoration: none;
            font-weight: bold; margin-top: 15px; transition: 0.3s;
        }

        .whatsapp { background: #25d366; color: white; }
        .menu-pdf { background: var(--azul-vip); color: white; }
    </style>
</head>
<body>

    <audio id="audioBienvenida" preload="auto"></audio>
    <audio id="audioClick" src="click.mp3" preload="auto"></audio>

    <div id="splash-screen">
        <h1 id="saludo-texto" style="font-weight: 300; margin-bottom: 0; letter-spacing: 2px;">HOLA</h1>
        <h2 style="font-weight: 700; margin-top: 5px; margin-bottom: 25px;">BIENVENIDO AL CLUB</h2>
        
        <div class="contenedor-registro">
            <div class="badge-alerta">ESTADO: ELEGIBLE PARA OBSEQUIO VIP</div>
            <p style="font-size: 13px; line-height: 1.4; margin-bottom: 20px;">
                Te <b>obsequiamos</b> tu membresía digital. Actívala para recibir un <b>Plato Especial de la Casa</b> en tu cumpleańos.
            </p>
            
            <input type="text" id="cliente-nombre" placeholder="Nombre completo">
            <input type="tel" id="cliente-whatsapp" placeholder="Tu WhatsApp">
            <div style="text-align: left; margin-top: 10px;">
                <label style="font-size: 10px; color: #ccc; margin-left: 5px;">FECHA DE NACIMIENTO:</label>
                <input type="date" id="cliente-cumple">
            </div>
            
            <button class="btn-activar" onclick="registrarYEntrar()">Activar mi Obsequio</button>
        </div>
    </div>

    <div id="main-content">
        <div class="tarjeta-vip">
            <h2 style="color: var(--azul-vip); margin-bottom: 0;">MENÚ ESPECIAL</h2>
            <div class="divider"></div>
            
            <div style="background: #eee; height: 200px; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-play-circle" style="font-size: 50px; color: var(--azul-vip);"></i>
            </div>

            <a href="https://wa.me/TUNUMERO" class="btn-accion whatsapp">
                <i class="fab fa-whatsapp" style="margin-right: 10px;"></i> PEDIR POR WHATSAPP
            </a>
            
            <a href="menu.pdf" class="btn-accion menu-pdf">
                <i class="fas fa-file-pdf" style="margin-right: 10px;"></i> VER CARTA COMPLETA
            </a>

            <div id="qrcode" style="margin-top: 30px; display: flex; justify-content: center;"></div>
            <p style="font-size: 11px; color: #999; margin-top: 15px;">SOCIO ID: <span id="socio-id"></span></p>
        </div>
    </div>

    <script>
        // Lógica de Saludo y Audio por Hora
        function configurarPorHora() {
            const hora = new Date().getHours();
            const saludo = document.getElementById('saludo-texto');
            const audio = document.getElementById('audioBienvenida');

            if (hora >= 6 && hora < 12) {
                saludo.textContent = "ˇBUENOS DÍAS!";
                audio.src = "audio_manana.mp3";
            } else if (hora >= 12 && hora < 20) {
                saludo.textContent = "ˇBUENAS TARDES!";
                audio.src = "audio_tarde.mp3";
            } else {
                saludo.textContent = "ˇBUENAS NOCHES!";
                audio.src = "audio_noche.mp3";
            }
        }

        // Función Principal al hacer clic
        function registrarYEntrar() {
            const nombre = document.getElementById('cliente-nombre').value;
            const whatsapp = document.getElementById('cliente-whatsapp').value;
            const cumple = document.getElementById('cliente-cumple').value;

            if(nombre && whatsapp && cumple) {
                // Efectos iniciales
                document.getElementById('audioClick').play();
                document.getElementById('audioBienvenida').play();

                // 1. Confeti
                confetti({
                    particleCount: 150, spread: 70, origin: { y: 0.6 },
                    colors: ['#1a2a6c', '#e74c3c', '#ffffff']
                });

                // 2. Procesar fecha para el cartel
                const opciones = { day: 'numeric', month: 'long' };
                const fechaFmt = new Date(cumple + "T00:00:00").toLocaleDateString('es-ES', opciones);

                // 3. Crear Cartel de Confirmación
                const aviso = document.createElement('div');
                aviso.innerHTML = `
                    <div id="cartel-vip" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 25px; text-align: center; z-index: 10000; width: 80%; max-width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border-bottom: 8px solid var(--rojo-vip);">
                        <div style="font-size: 50px;">??</div>
                        <h2 style="color: var(--azul-vip); font-size: 18px;">ˇTODO LISTO, ${nombre.toUpperCase()}!</h2>
                        <p style="color: #444; font-size: 14px; margin: 15px 0;">Te esperamos el día <b>${fechaFmt}</b> para festejar juntos tu cumple con tu <b>Plato Especial de la Casa</b>.</p>
                        <button id="cerrar-aviso" style="background: var(--azul-vip); color: white; border: none; padding: 12px 20px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer;">ˇEXCELENTE!</button>
                    </div>
                `;
                document.body.appendChild(aviso);

                // 4. Lógica de cierre del aviso
                document.getElementById('cerrar-aviso').onclick = function() {
                    document.getElementById('cartel-vip').style.display = 'none';
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                        setTimeout(() => { document.getElementById('main-content').style.opacity = '1'; }, 50);
                    }, 800);
                };

                // ID de socio aleatorio
                document.getElementById('socio-id').textContent = "VIP-" + Math.floor(1000 + Math.random() * 9000);
                
                // NOTA: Aquí conectarías con SheetDB (fetch)
            } else {
                alert("Por favor, completa tus datos para recibir tu obsequio.");
            }
        }

        // Inicializar
        window.onload = function() {
            configurarPorHora();
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 120, height: 120,
                colorDark : "#1a2a6c", colorLight : "#ffffff"
            });
        };
    </script>
</body>
</html>
